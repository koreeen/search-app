<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Search App</title>
</head>
<body>
    <h1>Vyhledávání</h1>
    <input type="text" id="query" placeholder="Zadejte slovní spojení" maxlength="100">
    <button onclick="search()">Hledat</button>

    <pre id="output"></pre>

     <button id="downloadBtn" onclick="downloadJSON()" style="display:none;">Stáhnout JSON</button>

    <script>
        let lastResults = [];

        async function search() {
            const query = document.getElementById("query").value;
            const res = await fetch(`/api/search?q=${query}`);
            const data = await res.json();

            document.getElementById("output").textContent =
                JSON.stringify(data, null, 2);

            lastResults = data;

            const downloadBtn = document.getElementById("downloadBtn");
            if (Array.isArray(data) && data.length > 0) {
                downloadBtn.style.display = "block";
            } else {
                downloadBtn.style.display = "none";
            }
        }

        function downloadJSON() {
            if (!lastResults.length) return;

            const blob = new Blob([JSON.stringify(lastResults, null, 2)], {
            type: "application/json"
            });

            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "results.json";
            a.click();

            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
